<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dado da Saúde Mental - RV Fixo na Visão</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0f2d66;
      font-family: 'Segoe UI', sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 10;
      padding: 0 20px;
    }
    #info small {
      font-weight: normal;
      opacity: 0.8;
    }
    #resultado {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      padding: 18px 32px;
      border-radius: 40px;
      color: #0f2d66;
      font-size: 28px;
      font-weight: 800;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      display: none;
      z-index: 10;
      text-align: center;
      min-width: 200px;
      backdrop-filter: blur(4px);
      border: 4px solid #f5b800;
    }
    #resultado span {
      display: block;
      font-weight: 400;
      font-size: 16px;
      color: #475569;
      margin-top: 6px;
    }
    #statusMovimento {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      z-index: 10;
      text-align: center;
      background: rgba(0,0,0,0.3);
      padding: 8px 16px;
      border-radius: 20px;
      backdrop-filter: blur(2px);
    }
    @media (max-width: 600px) {
      #resultado { font-size: 22px; padding: 14px 24px; min-width: 160px; }
      #info { font-size: 14px; top: 10px; }
      #statusMovimento { font-size: 12px; bottom: 10px; }
    }
  </style>
</head>
<body>
  <div id="info">🧠 Dado da Saúde Mental <small>— Gira a cabeça 2x ou toca no ecrã</small></div>
  <div id="resultado">🎲 <strong id="faceNome">CUIDA</strong><span id="faceDesc">Uma pequena ação de cuidado</span></div>
  <div id="statusMovimento">👤 Movimento: aguardando...</div>

  <!-- Importação da biblioteca Three.js + VR -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    // Configuração da cena
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f2d66);

    // Câmara
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.6, 0);

    // Renderizador
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Botão de RV (modo binocular)
    document.body.appendChild(VRButton.createButton(renderer));

    // Luzes
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(2, 5, 3);
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0x4488ff, 0.4);
    backLight.position.set(-2, 0, -3);
    scene.add(backLight);

    // ----- GRUPO QUE ACOMPANHA A CÂMARA (dado fixo na visão) -----
    const cameraGroup = new THREE.Group();
    cameraGroup.position.set(0, 0, -5.5); // Distância do dado (5.5 unidades à frente)
    scene.add(cameraGroup);

    // ----- CRIAR O DADO 3D COM IMAGENS + FRASES -----
    const tamanho = 1.6;
    const geometry = new THREE.BoxGeometry(tamanho, tamanho, tamanho);
    
    // Mapeamento das faces com imagens e frases
    const facesData = [
      { nome: 'ABRANDA',  frase: 'Abranda o ritmo antes de agir',       imagem: 'abranda.jpeg',  cor: 0xf26a00 },
      { nome: 'RESPIRA',  frase: 'Inspira 4s, expira 6s',                imagem: 'respira.jpeg',  cor: 0x007bd1 },
      { nome: 'EQUILIBRA',frase: 'Larga o que pesa, mantém o que ajuda', imagem: 'equilibra.jpeg',cor: 0x3c8f25 },
      { nome: 'CUIDA',    frase: 'Beber água, descansar, pedir ajuda',   imagem: 'cuida.jpeg',    cor: 0xe11d25 },
      { nome: 'ESCUTA',   frase: 'Atenção sem pressa',                  imagem: 'escuta.jpeg',   cor: 0xf5b800 },
      { nome: 'RECOMEÇA', frase: 'Tenta outra vez com calma',           imagem: 'recomeca.jpeg', cor: 0x009c9c }
    ];

    // Função para gerar textura com imagem + frase abaixo
    function gerarTextura(face) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');

        // Fundo branco
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 1024, 1024);

        // Borda colorida
        ctx.strokeStyle = '#' + face.cor.toString(16).padStart(6, '0');
        ctx.lineWidth = 30;
        ctx.strokeRect(30, 30, 964, 964);

        // Tentar carregar a imagem
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = face.imagem;

        img.onload = () => {
          // Desenhar a imagem no topo (60% da altura)
          const imgSize = 550;
          const imgX = (1024 - imgSize) / 2;
          const imgY = 80;
          ctx.drawImage(img, imgX, imgY, imgSize, imgSize);

          // Nome grande (centro)
          ctx.fillStyle = '#' + face.cor.toString(16).padStart(6, '0');
          ctx.font = 'bold 100px Segoe UI, Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(face.nome, 512, 660);

          // Frase abaixo do nome
          ctx.fillStyle = '#334155';
          ctx.font = '42px Segoe UI, Arial';
          ctx.fillText(face.frase, 512, 780);

          const texture = new THREE.CanvasTexture(canvas);
          const material = new THREE.MeshStandardMaterial({
            map: texture,
            roughness: 0.3,
            metalness: 0.1,
            side: THREE.DoubleSide
          });
          resolve(material);
        };

        img.onerror = () => {
          // Fallback sem imagem
          ctx.fillStyle = '#' + face.cor.toString(16).padStart(6, '0');
          ctx.font = 'bold 120px Segoe UI, Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(face.nome, 512, 450);
          
          ctx.fillStyle = '#334155';
          ctx.font = '50px Segoe UI, Arial';
          ctx.fillText(face.frase, 512, 600);

          const texture = new THREE.CanvasTexture(canvas);
          const material = new THREE.MeshStandardMaterial({
            map: texture,
            roughness: 0.3,
            metalness: 0.1
          });
          resolve(material);
        };
      });
    }

    // Carregar todas as texturas
    const promises = facesData.map(f => gerarTextura(f));
    Promise.all(promises).then((mats) => {
      const dice = new THREE.Mesh(geometry, mats);
      
      // Adicionar o dado ao grupo (fixo na visão)
      cameraGroup.add(dice);
      
      // Guardar referência
      window.diceMesh = dice;
      
      // Iniciar lógica
      iniciarLogica(dice);
    });

    // ----- LÓGICA DE ROTAÇÃO E SENSOR -----
    function iniciarLogica(dice) {
      let isSpinning = false;
      
      // Sensor de movimento (girar cabeça 2x)
      let lastGamma = 0;
      let movimentoCount = 0;
      let ultimoMovimentoTime = 0;
      let isDetecting = false;
      
      const statusEl = document.getElementById('statusMovimento');

      if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (event) => {
          const gamma = event.gamma || 0;
          const delta = Math.abs(gamma - lastGamma);
          
          if (delta > 15 && !isDetecting) {
            const now = Date.now();
            if (now - ultimoMovimentoTime < 600) {
              movimentoCount++;
              if (movimentoCount >= 2) {
                girarDado();
                movimentoCount = 0;
                isDetecting = true;
                setTimeout(() => { isDetecting = false; }, 800);
                statusEl.textContent = '🎯 Movimento detetado! A girar...';
              } else {
                statusEl.textContent = `👤 Movimento ${movimentoCount}/2...`;
              }
            } else {
              movimentoCount = 0;
            }
            ultimoMovimentoTime = now;
          }
          lastGamma = gamma;
        });
        statusEl.textContent = '👤 Sensor ativo! Gira a cabeça 2x rapidamente.';
      } else {
        statusEl.textContent = '⚠️ Sensor não disponível. Usa toque no ecrã.';
      }

      // Função para girar o dado
      function girarDado() {
        if (isSpinning) return;
        isSpinning = true;

        const idx = Math.floor(Math.random() * facesData.length);
        const faceNome = facesData[idx].nome;
        const faceFrase = facesData[idx].frase;
        const faceCor = facesData[idx].cor;

        // Rotação para cada face ficar para cima (eixo Z porque o dado está à frente)
        const rotacoes = {
          'CUIDA':    { x: 0, y: 0 },
          'RECOMEÇA': { x: 0, y: Math.PI },
          'ESCUTA':   { x: 0, y: -Math.PI/2 },
          'EQUILIBRA':{ x: 0, y: Math.PI/2 },
          'ABRANDA':  { x: -Math.PI/2, y: 0 },
          'RESPIRA':  { x: Math.PI/2, y: 0 }
        };

        const rot = rotacoes[faceNome];
        const extraX = rot.x + (Math.random() * 6 + 3) * Math.PI * 2;
        const extraY = rot.y + (Math.random() * 6 + 3) * Math.PI * 2;

        const startX = dice.rotation.x;
        const startY = dice.rotation.y;
        const duration = 2500;
        const startTime = performance.now();

        function animateRotation() {
          const elapsed = performance.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          
          dice.rotation.x = startX + (extraX - startX) * eased;
          dice.rotation.y = startY + (extraY - startY) * eased;

          if (progress < 1) {
            requestAnimationFrame(animateRotation);
          } else {
            dice.rotation.x = extraX;
            dice.rotation.y = extraY;
            isSpinning = false;
            mostrarResultado(faceNome, faceFrase, faceCor);
          }
        }
        animateRotation();
      }

      function mostrarResultado(nome, frase, cor) {
        const el = document.getElementById('resultado');
        const nomeEl = document.getElementById('faceNome');
        const descEl = document.getElementById('faceDesc');
        nomeEl.textContent = nome;
        nomeEl.style.color = '#' + cor.toString(16).padStart(6, '0');
        descEl.textContent = frase;
        el.style.display = 'block';
        setTimeout(() => {
          el.style.display = 'none';
        }, 6000);
      }

      // Evento de toque/clique
      renderer.domElement.addEventListener('click', girarDado);
      renderer.domElement.addEventListener('touchstart', girarDado);

      window.girarDado = girarDado;
    }

    // Ajustar tamanho da janela
    function onResize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', onResize);

    // Loop de renderização
    function animate() {
      renderer.setAnimationLoop(() => {
        // O grupo acompanha a câmara automaticamente
        cameraGroup.position.copy(camera.position);
        cameraGroup.position.z -= 5.5; // Distância fixa à frente
        cameraGroup.rotation.copy(camera.rotation);
        
        renderer.render(scene, camera);
      });
    }
    animate();

    console.log('🧠 Dado da Saúde Mental - RV com frases!');
    console.log('📱 Coloca o telemóvel nos óculos e diverte-te!');
  </script>
</body>
</html>
