<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dado da Saúde Mental - RV com Imagens</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0f2d66;
      font-family: 'Segoe UI', sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 10;
      padding: 0 20px;
    }
    #info small {
      font-weight: normal;
      opacity: 0.8;
    }
    #resultado {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      padding: 18px 32px;
      border-radius: 40px;
      color: #0f2d66;
      font-size: 28px;
      font-weight: 800;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      display: none;
      z-index: 10;
      text-align: center;
      min-width: 200px;
      backdrop-filter: blur(4px);
      border: 4px solid #f5b800;
    }
    #resultado span {
      display: block;
      font-weight: 400;
      font-size: 16px;
      color: #475569;
      margin-top: 6px;
    }
    #statusMovimento {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      z-index: 10;
      text-align: center;
      background: rgba(0,0,0,0.3);
      padding: 8px 16px;
      border-radius: 20px;
      backdrop-filter: blur(2px);
    }
    @media (max-width: 600px) {
      #resultado { font-size: 22px; padding: 14px 24px; min-width: 160px; }
      #info { font-size: 14px; top: 10px; }
      #statusMovimento { font-size: 12px; bottom: 10px; }
    }
  </style>
</head>
<body>
  <div id="info">🧠 Dado da Saúde Mental <small>— Gira a cabeça 2x ou toca no ecrã</small></div>
  <div id="resultado">🎲 <strong id="faceNome">CUIDA</strong><span id="faceDesc">Uma pequena ação de cuidado</span></div>
  <div id="statusMovimento">👤 Movimento: aguardando...</div>

  <!-- Importação da biblioteca Three.js + VR -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Configuração da cena
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f2d66);

    // Câmara mais distante
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.8, 6.5); // <--- MAIS DISTANTE (antes era 5)
    camera.lookAt(0, 0, 0);

    // Renderizador
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Botão de RV (modo binocular)
    document.body.appendChild(VRButton.createButton(renderer));

    // Luzes
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(2, 5, 3);
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0x4488ff, 0.4);
    backLight.position.set(-2, 0, -3);
    scene.add(backLight);
    const fillLight = new THREE.HemisphereLight(0x4488ff, 0x0f2d66, 0.6);
    scene.add(fillLight);

    // ----- CRIAR O DADO 3D COM IMAGENS -----
    const tamanho = 1.8;
    const geometry = new THREE.BoxGeometry(tamanho, tamanho, tamanho);
    
    // Mapeamento das faces com imagens
    const facesData = [
      { nome: 'CUIDA',    imagem: 'cuida.jpeg',    desc: 'Beber água, descansar, pedir ajuda', cor: 0xe11d25 },
      { nome: 'RECOMEÇA', imagem: 'recomeca.jpeg', desc: 'Tenta outra vez com calma',           cor: 0x009c9c },
      { nome: 'ESCUTA',   imagem: 'escuta.jpeg',   desc: 'Atenção sem pressa',                  cor: 0xf5b800 },
      { nome: 'EQUILIBRA',imagem: 'equilibra.jpeg',desc: 'Larga o que pesa, mantém o que ajuda', cor: 0x3c8f25 },
      { nome: 'ABRANDA',  imagem: 'abranda.jpeg',  desc: 'Abranda o ritmo antes de agir',       cor: 0xf26a00 },
      { nome: 'RESPIRA',  imagem: 'respira.jpeg',  desc: 'Inspira 4s, expira 6s',                cor: 0x007bd1 }
    ];

    // Função para carregar texturas das imagens
    const textureLoader = new THREE.TextureLoader();
    let imagensCarregadas = 0;
    const materiais = [];

    function criarMaterial(face) {
      return new Promise((resolve) => {
        textureLoader.load(face.imagem, (texture) => {
          const material = new THREE.MeshStandardMaterial({
            map: texture,
            roughness: 0.3,
            metalness: 0.1,
            side: THREE.DoubleSide
          });
          resolve(material);
        }, undefined, () => {
          // Fallback se imagem não carregar (canvas)
          const canvas = document.createElement('canvas');
          canvas.width = 512;
          canvas.height = 512;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, 512, 512);
          ctx.strokeStyle = '#' + face.cor.toString(16).padStart(6, '0');
          ctx.lineWidth = 20;
          ctx.strokeRect(20, 20, 472, 472);
          ctx.fillStyle = '#' + face.cor.toString(16).padStart(6, '0');
          ctx.font = 'bold 80px Segoe UI, Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(face.nome, 256, 256);
          const textureFallback = new THREE.CanvasTexture(canvas);
          const material = new THREE.MeshStandardMaterial({
            map: textureFallback,
            roughness: 0.3,
            metalness: 0.1
          });
          resolve(material);
        });
      });
    }

    // Carregar todas as imagens em paralelo
    const promises = facesData.map(f => criarMaterial(f));
    Promise.all(promises).then((mats) => {
      materiais.push(...mats);
      const dice = new THREE.Mesh(geometry, materiais);
      dice.position.y = 0.2;
      scene.add(dice);
      
      // Guardar referência global para o dado
      window.diceMesh = dice;
      
      // Adicionar chão suave
      const ringGeo = new THREE.RingGeometry(1.2, 1.6, 64);
      const ringMat = new THREE.MeshStandardMaterial({
        color: 0x3b82f6,
        transparent: true,
        opacity: 0.2,
        side: THREE.DoubleSide
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = -0.9;
      scene.add(ring);
      
      // Iniciar lógica de rotação
      iniciarLogica(dice);
    });

    // Controles para desktop
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = false;
    controls.enableZoom = true;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI / 2;

    // Lógica de rotação e sensor de movimento
    function iniciarLogica(dice) {
      let isSpinning = false;
      let currentRotation = 0;
      
      // ----- SENSOR DE MOVIMENTO (GIRAR CABEÇA 2x) -----
      let lastGamma = 0;
      let lastDelta = 0;
      let movimentoCount = 0;
      let ultimoMovimentoTime = 0;
      let isDetecting = false;
      
      const statusEl = document.getElementById('statusMovimento');

      if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (event) => {
          const gamma = event.gamma || 0; // rotação lateral (esquerda/direita)
          
          // Detetar mudança brusca de direção (giro de cabeça)
          const delta = Math.abs(gamma - lastGamma);
          
          if (delta > 15 && !isDetecting) { // Limiar de 15 graus
            const now = Date.now();
            if (now - ultimoMovimentoTime < 600) { // Menos de 600ms entre giros = 2x rápido
              movimentoCount++;
              if (movimentoCount >= 2) {
                // GIRAR DADO!
                girarDado();
                movimentoCount = 0;
                isDetecting = true;
                setTimeout(() => { isDetecting = false; }, 800);
                statusEl.textContent = '🎯 Movimento detetado! A girar...';
              } else {
                statusEl.textContent = `👤 Movimento ${movimentoCount}/2...`;
              }
            } else {
              movimentoCount = 0;
            }
            ultimoMovimentoTime = now;
          }
          
          lastGamma = gamma;
          lastDelta = delta;
        });
        statusEl.textContent = '👤 Sensor ativo! Gira a cabeça 2x rapidamente.';
      } else {
        statusEl.textContent = '⚠️ Sensor não disponível. Usa toque no ecrã.';
      }

      // ----- FUNÇÃO GIRAR DADO -----
      function girarDado() {
        if (isSpinning) return;
        isSpinning = true;

        // Escolher uma face aleatória
        const idx = Math.floor(Math.random() * facesData.length);
        const faceNome = facesData[idx].nome;
        const faceDesc = facesData[idx].desc;
        const faceCor = facesData[idx].cor;

        // Calcular rotação para aquela face ficar para cima
        const rotacoes = {
          'CUIDA':    { x: 0, y: 0 },
          'RECOMEÇA': { x: 0, y: Math.PI },
          'ESCUTA':   { x: 0, y: -Math.PI/2 },
          'EQUILIBRA':{ x: 0, y: Math.PI/2 },
          'ABRANDA':  { x: -Math.PI/2, y: 0 },
          'RESPIRA':  { x: Math.PI/2, y: 0 }
        };

        const rot = rotacoes[faceNome];
        // Adicionar voltas extras para efeito de giro
        const extraX = rot.x + (Math.random() * 6 + 3) * Math.PI * 2;
        const extraY = rot.y + (Math.random() * 6 + 3) * Math.PI * 2;

        // Animar rotação
        const startX = dice.rotation.x;
        const startY = dice.rotation.y;
        const duration = 2500;
        const startTime = performance.now();

        function animateRotation() {
          const elapsed = performance.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          // Easing suave
          const eased = 1 - Math.pow(1 - progress, 3);
          
          dice.rotation.x = startX + (extraX - startX) * eased;
          dice.rotation.y = startY + (extraY - startY) * eased;

          if (progress < 1) {
            requestAnimationFrame(animateRotation);
          } else {
            dice.rotation.x = extraX;
            dice.rotation.y = extraY;
            isSpinning = false;
            mostrarResultado(faceNome, faceDesc, faceCor);
          }
        }
        animateRotation();
      }

      function mostrarResultado(nome, desc, cor) {
        const el = document.getElementById('resultado');
        const nomeEl = document.getElementById('faceNome');
        const descEl = document.getElementById('faceDesc');
        nomeEl.textContent = nome;
        nomeEl.style.color = '#' + cor.toString(16).padStart(6, '0');
        descEl.textContent = desc;
        el.style.display = 'block';
        setTimeout(() => {
          el.style.display = 'none';
        }, 6000);
      }

      // Evento de toque/clique no ecrã
      renderer.domElement.addEventListener('click', girarDado);
      renderer.domElement.addEventListener('touchstart', girarDado);

      // Guardar função global para reset
      window.girarDado = girarDado;
    }

    // Ajustar tamanho
    function onResize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', onResize);

    // Loop de renderização
    function animate() {
      renderer.setAnimationLoop(() => {
        if (!renderer.xr.isPresenting) {
          controls.update();
        }
        renderer.render(scene, camera);
      });
    }
    animate();

    // Pequena rotação automática quando parado
    let idleRotation = 0;
    setInterval(() => {
      if (window.diceMesh && !window.isSpinning && !renderer.xr.isPresenting) {
        idleRotation += 0.002;
        if (idleRotation > 0.1) idleRotation = 0;
        window.diceMesh.rotation.y += idleRotation * 0.3;
      }
    }, 50);

    console.log('🧠 Dado da Saúde Mental em RV com imagens!');
    console.log('📱 Coloca o telemóvel nos óculos e diverte-te!');
    console.log('🔄 Gira a cabeça 2x rapidamente para ativar o dado.');
  </script>
</body>
</html>
